name: CI

on:
  push:
    branches: [main]
    paths:
      - "Packages/mcp-unity/Server~/**"
  pull_request:
    branches: [main]
    paths:
      - "Packages/mcp-unity/Server~/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Packages/mcp-unity/Server~

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: Packages/mcp-unity/Server~/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
